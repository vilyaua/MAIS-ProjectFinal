services:
  # Web UI — http://localhost:8000
  web:
    image: dev-team:latest
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
      - ./output:/app/output
      - ./logs:/app/logs
      - ./data:/app/data
      - ./index:/app/index
    entrypoint: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]

  # Interactive CLI — docker compose --profile cli run --rm cli
  cli:
    image: dev-team:latest
    build: .
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
      - ./output:/app/output
      - ./logs:/app/logs
      - ./data:/app/data
      - ./index:/app/index
    entrypoint: ["python", "main.py"]
    profiles: ["cli"]

  # One-off ingestion — docker compose --profile tools run --rm ingest
  ingest:
    image: dev-team:latest
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./index:/app/index
    entrypoint: ["python", "ingest.py"]
    profiles: ["tools"]

  # Run tests — docker compose --profile tools run --rm test
  test:
    image: dev-team:latest
    build: .
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
      - ./output:/app/output
    entrypoint: ["python", "-m", "pytest", "tests/", "-v"]
    profiles: ["tools"]
