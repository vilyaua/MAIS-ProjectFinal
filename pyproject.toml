[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "S", "W"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S"]
"dev-team/tests/*" = ["S"]
"dev-team/tools.py" = ["E501", "S602", "S603", "S607"]
"dev-team/app.py" = ["E501"]
"dev-team/upload_prompts.py" = ["E501"]
"dev-team/output/*" = ["E", "S", "F", "W"]
"dev-team/github_integration.py" = ["S110"]
